<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f9f9f9;
        }
        .navbar {
            background-color: #333;
            overflow: hidden;
            padding: 15px 30px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .navbar a {
            float: left;
            display: block;
            color: white;
            text-align: center;
            padding: 14px 20px;
            text-decoration: none;
            font-size: 17px;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }
        .navbar a:hover {
            background-color: #575757;
        }
        .navbar a.active {
            background-color: #007bff;
            color: white;
        }
        .container {
            margin: 30px;
        }
        h1, h2, h3 {
            color: #333;
            text-align: center;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
        .dashboard-section {
            margin-bottom: 40px;
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .chart-wrapper {
            position: relative;
            width: 100%;
            max-width: 600px; /* Max width for charts */
            height: 250px; /* Fixed height for charts */
            margin: 20px auto;
        }
        canvas {
            display: block;
            width: 100% !important;
            height: 100% !important;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <a href="/">📊 Sales</a>
        <a href="/customers">👥 Customers</a>
        <a class="active" href="/products">📦 Products</a>
        <a href="/employees">👨‍💼 Employees</a>
        <a href="/transactions">💸 Transactions</a>
    </div>

    <div class="container">
        <h1>📦 Product Dashboard</h1>

        <div class="dashboard-section">
            <h2>Total Products: {{ total_products }}</h2>
            <p>Average Unit Cost: ${{ "{:,.2f}".format(avg_unit_cost) }}</p>
            <p>Average Unit Price: ${{ "{:,.2f}".format(avg_unit_price) }}</p>
        </div>

        <div class="dashboard-section">
            <h3>Products per Category</h3>
            <div class="chart-wrapper">
                <canvas id="productsByCategoryChart"></canvas>
            </div>
        </div>

        <div class="dashboard-section">
            <h3>Products per Suppliers</h3>
            <div class="chart-wrapper">
                <canvas id="productsBySupplierChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        // --- Products by Category - Bar Chart ---
        const categoryLabels = {{ products_by_category | map(attribute='Category') | list | tojson }};
        const categoryData = {{ products_by_category | map(attribute='count') | list | tojson }};
        new Chart(document.getElementById('productsByCategoryChart'), {
            type: 'bar',
            data: {
                labels: categoryLabels,
                datasets: [{
                    label: 'Jumlah Produk',
                    data: categoryData,
                    backgroundColor: '#007bff',
                    borderRadius: 6
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    title: { display: false }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: {
                            precision: 0
                        }
                    }
                }
            }
        });

        // --- Products by Supplier - Bar Chart ---
        const supplierLabels = {{ products_by_supplier | map(attribute='Supplier') | list | tojson }};
        const supplierData = {{ products_by_supplier | map(attribute='count') | list | tojson }};
        new Chart(document.getElementById('productsBySupplierChart'), {
            type: 'bar',
            data: {
                labels: supplierLabels,
                datasets: [{
                    label: 'Jumlah Produk',
                    data: supplierData,
                    backgroundColor: '#28a745',
                    borderRadius: 6
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    title: { display: false }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: {
                            precision: 0
                        }
                    }
                }
            }
        });
    </script>

</body>
</html>
